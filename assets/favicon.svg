<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5a3cd2"/>
      <stop offset="100%" stop-color="#9650f5"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Card outline -->
  <rect x="17" y="10" width="30" height="44" rx="3" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.5"/>
  <rect x="20" y="13" width="24" height="38" rx="2" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="0.8"/>
  <!-- 4-pointed star -->
  <polygon points="32,20 34.5,28 43,30 34.5,32 32,40 29.5,32 21,30 29.5,28" fill="#ffd700" opacity="0.9"/>
  <polygon points="32,25 33.2,28.5 37,30 33.2,31.5 32,35 30.8,31.5 27,30 30.8,28.5" fill="#ffe680" opacity="0.8"/>
  <!-- Small dot below star -->
  <circle cx="32" cy="46" r="2.5" fill="rgba(255,255,255,0.5)"/>
  <!-- Corner dots -->
  <circle cx="22" cy="16" r="1" fill="rgba(255,255,255,0.4)"/>
  <circle cx="42" cy="16" r="1" fill="rgba(255,255,255,0.4)"/>
  <circle cx="22" cy="48" r="1" fill="rgba(255,255,255,0.4)"/>
  <circle cx="42" cy="48" r="1" fill="rgba(255,255,255,0.4)"/>
</svg>
